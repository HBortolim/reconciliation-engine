version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reconciliation-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reconciliation}
      POSTGRES_USER: ${POSTGRES_USER:-recon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recon_secret_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recon_user} -d ${POSTGRES_DB:-reconciliation}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reconciliation-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: reconciliation-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reconciliation-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: reconciliation-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reconciliation-net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    container_name: reconciliation-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-reconciliation}
      - POSTGRES_USER=${POSTGRES_USER:-recon_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-recon_secret_dev}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-reconciliation-files}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - API_JWT_SECRET=${API_JWT_SECRET:-dev-jwt-secret-change-in-production}
      - API_CORS_ORIGINS=${API_CORS_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reconciliation-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    container_name: reconciliation-worker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-reconciliation}
      - POSTGRES_USER=${POSTGRES_USER:-recon_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-recon_secret_dev}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-reconciliation-files}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-4}
      - WORKER_REDIS_STREAM=${WORKER_REDIS_STREAM:-reconciliation-jobs}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - reconciliation-net
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.dashboard
    container_name: reconciliation-dashboard
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - api
    networks:
      - reconciliation-net
    restart: unless-stopped

networks:
  reconciliation-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
